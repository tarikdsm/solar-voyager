name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Performance gates
        run: npm run test:perf-gates

      - name: Injected smoke error regressions
        timeout-minutes: 5
        run: npm run test:smoke -- --negative-fixtures-only

      - name: Application smoke
        timeout-minutes: 5
        run: npm run test:smoke -- --production-only

      - name: Main menu regression
        run: npm run test:main-menu

      - name: System map regression
        timeout-minutes: 5
        run: npm run test:system-map

      - name: Burn log regression
        timeout-minutes: 5
        run: npm run test:burn-log

      - name: Orbital tutorial regression
        timeout-minutes: 5
        run: npm run test:tutorial

      - name: Render depth regression
        run: npm run test:render-depth

      - name: Starfield regression
        run: npm run test:starfield

      - name: Visual tier fly-in regression
        run: npm run test:visual-tiers

      - name: Lighting and post-processing regression
        run: npm run test:lighting-post

      - name: Relativistic visuals regression
        timeout-minutes: 2
        run: npm run test:relativistic-visuals

      - name: Surface detail regression
        run: npm run test:surface-detail

      - name: Procedural Sun regression
        run: npm run test:procedural-sun

      - name: Gas giant animation regression
        run: npm run test:gas-giants

      - name: Camera controls regression
        run: npm run test:camera-controls

      - name: Renderer policy regression
        run: npm run test:renderer-policy

      - name: Telemetry overhead regression
        run: npm run test:telemetry

      - name: HUD signal granularity regression
        run: npm run test:hud-signals

      - name: State-vector widget regression
        run: npm run test:state-vectors

      - name: Trajectory overlay regression
        timeout-minutes: 4
        run: npm run test:trajectory-overlay

      - name: Performance panel regression
        run: npm run test:perf-panel
      - name: Adaptive quality governor regression
        run: npm run test:perf-governor

      - name: Session settings regression
        run: npm run test:session-settings

      - name: Tool tests
        run: npm run test:tools

      - name: Asset budgets
        run: npm run check:budgets

      - name: Task-file schema check
        run: npm run check:tasks
