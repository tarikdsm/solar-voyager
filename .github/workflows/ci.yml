name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Render depth regression
        run: npm run test:render-depth

      - name: Starfield regression
        run: npm run test:starfield

      - name: Visual tier fly-in regression
        run: npm run test:visual-tiers

      - name: Tool tests
        run: npm run test:tools

      - name: Build
        run: npm run build

      - name: Asset budgets
        run: npm run check:budgets

      - name: Task-file schema check
        run: npm run check:tasks
