name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.scaffold.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect scaffold
        id: scaffold
        run: echo "exists=$([ -f package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.scaffold.outputs.exists == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install & build
        if: steps.scaffold.outputs.exists == 'true'
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        if: steps.scaffold.outputs.exists == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.outputs.exists == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
