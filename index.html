<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='7' fill='%23f8fafc'/%3E%3Cellipse cx='32' cy='32' rx='27' ry='11' fill='none' stroke='%2338bdf8' stroke-width='4' transform='rotate(-24 32 32)'/%3E%3C/svg%3E"
    />
    <title>Solar Voyager</title>
  </head>
  <body>
    <canvas
      id="space-canvas"
      aria-label="Solar Voyager space view. Drag to orbit, scroll to zoom, and use bracket keys to change focus."
    ></canvas>
    <section
      id="startup-loading"
      class="startup-loading"
      role="status"
      aria-busy="true"
      aria-live="polite"
      data-startup-stage="boot"
    >
      <p class="startup-kicker">Solar Voyager</p>
      <h1 id="startup-title">Preparing mission control</h1>
      <progress id="startup-progress" max="1" value="0" aria-labelledby="startup-title"></progress>
      <p id="startup-message">Starting renderer</p>
      <button id="startup-retry" type="button" hidden>Retry</button>
    </section>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
