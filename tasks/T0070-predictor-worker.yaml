  Final-review fix wave (2026-07-18):
  - Commit 50015f9 moves the packed prediction layout into pure
    `src/sim/analysis/trajectoryPredictionLayout.ts`; the worker protocol
    reexports the existing public constants and event code, while an ESLint
    restricted-path zone now rejects every `src/sim -> src/workers` import.
  - The same commit makes client dispatch transactional. Synchronous
    `postMessage` throws, worker `error`, and worker `messageerror` now produce
