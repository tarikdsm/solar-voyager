    chunk 914.76 kB)
  - npm run check:budgets: passed (repo 139.25 MiB, assets 19.51 MiB,
    critical path 4.08 MiB)
  - npm run check:tasks: passed (53 task files)

  origin/main remained at 6ecf3e6 after git fetch origin, so no rebase was
