spec: |
  workers/predictor.worker.ts + protocol: thrust-free propagation reusing
  dp54/nbodyForces verbatim, horizon max(2 periods, 90 d, user-extended),
  <=2000-pt polyline via transferable Float64Array, events (SOI, closest
  approach, impact + time-to-impact). Debounce rules per architecture.md.
acceptance:
  - Worker polyline within 1 km of main-thread propagation over 30 days (test)
  - Main-thread frame impact < 0.5 ms
handoff_notes: |
  Delivery summary:
  - Production predictions emit at most 2,000 points. A canonical no-event
    result transfers 64,000 point bytes plus 0 event bytes; event payloads are
    variable-length and transfer only their actual-sized Float64Array storage.
  - Each request transfers the seven-component float64 ship state (56 bytes).
  - The 30-day acceptance comparison passed across 31 daily samples with a
    maximum position error of 0.0168491658562252 km (required maximum: 1 km).
  - Clean client update p99 was 0.000200 ms (required maximum: 0.5 ms).
  - Impact crossing detection runs once per accepted DP54 step and uses linear
    body-relative segment/sphere interpolation within that accepted step.
  - Focused predictor acceptance coverage passed 5 files / 30 tests. The final
    full Vitest gate passed 94 files with 1 skipped / 580 tests with 3 skipped;
    the Python tools gate passed 50 tests.
  - ADR-030 records prediction sampling, event detection, impact interpolation,
    and the accepted-step observation decision.
  - Independent per-task reviews approved Tasks 1 through 5. Task 5 retained a
    historical Minor note: its original RED evidence was unavailable because
    the predictor core predated the acceptance-test slice; this has no
    functional impact and all current focused and full tests pass.

  Principal commits:
  - a6536cc define predictor protocol contract
  - 4d0729b harden predictor transfer contract
  - d74a66d add thrust-free trajectory predictor
  - bd05332 detect impacts per accepted step
  - c8a52f1 add predictor worker runtime
  - 54d84bf add debounced predictor client
  - 519f9f1 add predictor acceptance coverage

  Final gates (2026-07-18):
