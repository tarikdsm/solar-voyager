spec: |
  sim/ship/relativity.ts per physics-spec section 3 / ADR-007: celerity
  state u = gamma*v, gamma = sqrt(1+|u|^2/c^2), v = u/gamma, dtau/dt = 1/gamma;
  derivative function for the (r, u, tau) 7-component state combining the
  Newtonian n-body field with proper-acceleration thrust; helpers for
  % of c, relativistic momentum p = gamma*m*v and kinetic energy (gamma-1)*m*c^2.
  Pure module, shared by SimulationCore and the predictor worker.
acceptance:
  - Hyperbolic-motion analytic test (physics-spec 7.8) to 1e-9 up to gamma = 10
  - Newtonian-limit test (7.9), 10-orbit LEO final separation from pure Newtonian < 5e-8 relative (ADR-012)
  - Time-dilation test (7.11); |v| < c invariant under integrator stress
handoff_notes: |
  Implemented src/sim/ship/relativity.ts with robust celerity/gamma/velocity,
  momentum, kinetic-energy, and allocation-free DP54 derivative helpers.
  Regression coverage: analytic hyperbolic motion through gamma=10, one year
  at gamma=2, subluminal float64 behavior through gamma=1e8 and extreme finite
  3D celerity, and ten-period LEO Newtonian-limit separation (4e-8..5e-8).
  ADR-012 documents why the original 1e-9 Newtonian bound was physically
  impossible under ADR-007 and records the corrected 5e-8 ceiling.
  Independent review found no critical issues; its two important findings
  (float64 v==c rounding and missing lower phase-drift bound) were fixed.
  Verified 2026-07-16: lint, typecheck, 128 tests, build, format, task schema,
  and asset budgets all pass. Build retains the pre-existing >500 kB chunk warning.
  Final independent merger review verified the full main..branch diff, ADR-012,
  physics-spec sections 3/6/7.8/7.9/7.11, purity, buffer reuse, and all acceptance
  criteria. Fresh local gates and GitHub CI passed before merge.
