id: T0035
title: Asset ingest pipeline (assets/ -> public/assets/)
status: REVIEW
agent: chatgpt
branch: task/T0035-asset-ingest-pipeline
depends_on: [T0001]
milestone: M1
spec: |
  npm run assets:ingest per docs/asset-pipeline.md + assets/models/
  MODELING-GUIDE.md: validate deliverables (naming, category, normalized
  scale = radius 1.0 via bounding sphere, pole orientation, tri budgets,
  texture sizes/aspect, SOURCES.md present, no embedded textures/lights/
  cameras/animations), then Draco-compress meshes (14/10/12), encode
  KTX2 (ETC1S albedo/emissive, UASTC normals, full mip chains), enforce
  per-body byte budgets, emit to public/assets/ + a manifest json the
  loader consumes. Clear, actionable error messages — humans and agents
  will hit these.
acceptance:
  - A guide-violating fixture (wrong scale, missing SOURCES.md, embedded texture) fails with a message naming the violated guide section
  - Earth fixture round-trips within the 20 MB hero budget
  - Ingest is idempotent (re-run produces identical bytes)
handoff_notes: |
  Added sorted source discovery, aggregated guide-section diagnostics, raw GLB
  authoring checks, world-space primary-body scale/origin/+Y validation, texture
  metadata and attribution checks, category triangle limits, Draco 14/10/12,
  ETC1S/UASTC KTX2 with full mips, per-body byte gates, canonical manifest, and
  transactional publication. The required violating fixture reports sections 2,
  3, and 8 in one run. Real KTX-Software 4.4.2 verification produced Earth at
  5,172,586 bytes and all 7 files were byte-identical across two complete runs.
  Published 5 assets: Earth 32,256 tris, Pluto 3,968, Saturn 37,568, ship 6,174,
  Sun 16,128. public/assets is 6.02 MiB; critical path is 5.47 MiB (< 8 MiB).
  Official KTX validation and Draco decode passed for every artifact. Final gates:
  lint/typecheck passed; Vitest 204 passed / 3 skipped; Python 22 passed; format,
  build, 52-task schema, budgets, and diff check passed.
