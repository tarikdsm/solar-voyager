spec: |
  ADR-010 Tier A: fully procedural Sun — animated convective granulation
  (domain-warped fbm, time-scaled so it also respects sim warp visually),
  limb darkening, emissive intensity feeding the bloom pass, billboard
  corona/glare, occasional prominence arcs on the limb. Low-octave
  fallback rung for the governor. TSL-portable, seeded. Replaces the
  static SDO texture as primary path (texture remains optional fallback).
acceptance:
  - Sun looks alive at every distance from Mercury flyby to Neptune (screenshot set)
  - Shader cost within render budget at 1080p; low-octave rung measurably cheaper
  - No visible tiling/banding artifacts; limb darkening matches reference photos
handoff_notes: |
  Review head implements seeded object-space domain-warped fBm, the quadratic
  limb profile, simulation-time animation, one bounded corona/prominence
  billboard, 4/2/1 octave quality rungs, precompilation, and authored fallback.
  WebGL metrics: programs 10 -> 23 -> 23, GL errors 0, limb/center 0.7037,
  animated fraction 0.4323, repetition peaks H/V 0.0073/0.0267, 73,750 warm
  off-disc pixels, and Mercury/Earth/Neptune lit pixels 948/678/740. Original
  close, animated, fallback, and distance screenshots were reviewed with no
  seam, grid, square billboard edge, or distance failure.
  Exact 1920x1080 quality SHA 3f567ef: full/minimum p75 7.425/6.252 ms
  (minimum 15.81% cheaper, 360 samples each). Adjacent production pair
  7c4ba83/3f567ef: 60.003/60.000 fps, GPU p75 3.016/2.468 ms, draws 23/23,
  triangles 65,091/65,091, programs 35/38, textures 24/24, zero browser
  errors. Adapter was RTX 3070 Laptop, stronger than the literal reference
  class; this limitation is disclosed in docs/bench/T0084-summary.md.
  Final gates: 447 Vitest passed + 3 skipped, 50 Python passed, ten browser
  regressions passed, build/budgets/task schema passed, and assets:verify found
