  WebGL metrics: programs 10 -> 23 -> 23, GL errors 0, isolated post-ACES
  limb/center 0.9051, inner-disc/center 0.9887,
  animated fraction 0.4323, repetition peaks H/V 0.0073/0.0267, 73,750 warm
  off-disc pixels, and centered Mercury/Earth/Neptune ROI lit pixels 313/52/109
