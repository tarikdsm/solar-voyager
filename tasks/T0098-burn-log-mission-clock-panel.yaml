id: T0098
title: Burn log panel and UTC mission clock
status: REVIEW
agent: chatgpt
branch: task/T0098-burn-log-utc
depends_on: [T0053, T0054, T0058, T0096]
milestone: M5
spec: |
  Surface the canonical fixed-capacity burn log in the HUD and add a UTC mission
  clock derived from simulation TDB display time. The panel shows each completed
  and active burn's system/proper start and end, energy, proper delta-v, peak
  power, dominant body, and signed prograde/normal/radial decomposition using
  shared formatters. It must support keyboard navigation, an empty state, bounded
  rendering for 256 entries, and exact persistence across save/load.
acceptance:
  - A scripted burn appears within one HUD update with values matching the SimulationCore ledger and UTC clock
  - Active, completed, wrapped-capacity, empty, save/load, and relativistic clock-divergence states have unit coverage
  - Panel interaction is accessible and does not allocate or iterate the 256-entry history on every animation frame
  - Real-browser evidence shows the panel readable at desktop and compact viewport sizes with no console errors
handoff_notes: |
  Implemented the bounded canonical burn-log panel and explicit J2026 TDB
  mission-UTC display. The UI uses 256 setup-preallocated stable row graphs plus
  one active row, synchronous save/import rebind, exact full-ring overwrite
  detection, keyboard navigation, compact/reduced-motion layouts, and a raw-core
  fixed diagnostic independent of UI formatting. Protected simulation commands,
  snapshots, physics formulae, and save schema are unchanged.

  Independent review: C0/I0/M0. Full unit: 750 passed, 3 skipped. Real-browser
  regression performs KeyR/KeyF burns, proves active display within one HUD
  publish, compares all 11 raw/formatted fields, verifies unchanged commits do
  not rebuild, and restores the exact burn through Save/reload/Continue. Desktop
  and 390px compact layouts, menu, system map, settings, and smoke are green.
  Production perf: 10 draws, 77,071 triangles, heap -162,791 B; entry/total
  bundle 120,945/567,544 B gzip. Bench median/p75 stayed 6.1/6.1 ms.
