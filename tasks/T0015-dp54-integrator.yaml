id: T0015
title: DP54 adaptive integrator
status: DONE
agent: chatgpt
branch: task/T0015-dp54-integrator
depends_on: [T0010]
milestone: M1
spec: |
  physics-spec 3.1 / ADR-002: Dormand-Prince 5(4) FSAL, published tableau to
  full double precision, PI step control, tolerances from spec. Pure
  propagate(state, t0, t1, derivFn, tol), generic over the state vector —
  in production it integrates the 7-component relativistic (r, u, tau)
  state whose derivative function comes from T0017.
acceptance:
  - physics-spec 7.2 two-body tests pass (10 periods, <1e-3 km, drift <1e-9)
  - Step controller respects the 4000-substep budget interface
handoff_notes: |
  Implemented a caller-owned, allocation-free generic DP54 propagator with the
  published full-precision tableau, FSAL reuse, adaptive error control, horizon
  clipping, step-underflow reporting, and the 4000-accepted-step budget interface.
  Added the specified seven-component ship tolerance factory and regression tests
  for circular and e=0.7 two-body orbits over ten periods. Independent review found
  and drove fixes for non-finite derivative termination and an ambiguity between
  local operational tolerance and global convergence evidence. ADR-011 now defines
  the separate test-only verification profile; both profiles have explicit tests.
  Independent review approved 9168955 after all mandatory gates and CI passed.
