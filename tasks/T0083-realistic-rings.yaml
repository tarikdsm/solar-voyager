id: T0083
title: Realistic ring systems (Saturn, Uranus, Jupiter, Neptune)
status: IN_PROGRESS
agent: chatgpt
branch: task/T0083-realistic-rings
depends_on: [T0041, T0043]
milestone: M6
spec: |
  rendering-spec section 11 + MODELING-GUIDE sections 3-5: annulus meshes
  at true radial ratios (alpha = optical depth) from real ring data;
  shader with planet shadow across the ring, ring shadow on the planet,
  and backlit transmission on the unlit side. Assets for all four ringed
  planets delivered through ingest.
  CLOSE-RANGE FLYTHROUGH (v1 scope, maintainer decision 2026-07-15):
  when the ship nears the ring plane (Saturn), spawn an instanced ice-
  particle field (InstancedMesh, single draw call, thousands of seeded
  chunks) around the camera; density/color/size sampled from the same
  radial ring data; smooth cross-fade to the textured annulus with
  distance; particles orbit at local Keplerian speed. Budget-gated by
  the perf governor (particle count is a quality knob).
acceptance:
  - Saturn ring proportions verified against published radii (D ring to F ring)
  - Shadow and backlight cues visible and correct vs Sun geometry (test scene)
  - Flythrough: flying through the ring plane shows parallax ice chunks with no visible pop to the annulus; 60 fps floor held on reference hardware
  - Ring set within the 2 MB per-planet budget (particles are procedural, ~0 bytes)
handoff_notes: |
  A Saturn source model and annulus texture were committed directly to main in
  b8d7cd9 with build_saturn.py, saturn.glb, albedo/ring maps, and SOURCES.md.
  This is partial prior art only: the task still requires all four ringed planets,
  runtime shadow/backlight shaders, close-range flythrough particles, ingest,
  performance evidence, and its T0041/T0043 dependencies. Keep TODO until the
  dependencies are DONE and the full task can be claimed.
