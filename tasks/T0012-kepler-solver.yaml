spec: |
  physics-spec.md section 2: Newton-Raphson Kepler solve (elliptic |dE|<1e-12,
  max 30 iters, E0=M or pi if e>0.8; hyperbolic branch for comets), perifocal
  frame, Rz(O)Rx(i)Rz(w) rotation, and full osculating elements <-> state
  vector conversions with e->0 / i->0 degeneracy handling.
acceptance:
  - physics-spec 7.1 tolerances met across e in [0,0.99] and (1,5]
  - Round-trip elements<->state 1e-10 relative
handoff_notes: |
  Implemented allocation-conscious elliptic/hyperbolic Newton solvers with
  caller-owned convergence metadata, the §2 perifocal-to-inertial rotation,
  and bidirectional osculating elements/state conversions. Canonical handling
  covers circular-equatorial, circular-inclined, eccentric-equatorial, and
  retrograde-equatorial degeneracies. TDD exposed and fixed divergence for
  e=0.99 with negative mean anomaly by reducing elliptic M while preserving
  complete turns. Near-parabolic hyperbolic residuals and derivatives use
  cancellation-resistant forms; state conversion selects an energy- or
  angular-momentum-based semi-major axis according to conditioning and
  canonicalizes numerical periapsis. Inclination recovery uses atan2 to retain
  near-equatorial inclinations. Review-driven regressions extend the stable
  hyperbolic series through H^17 and use conditioned scalar invariants plus a
  cancellation-resistant transverse velocity in the e-to-1 limit. The
  hyperbolic starter selects the better linear/cubic asymptote for |M|<1,
  retaining convergence down to |M|=1e-16. A 423-case
  property grid covered e=[0,0.99], e=[1.000001,5], inclinations [0,pi],
  M=[-10,10], and q=1000 km down to e=1+1e-12, with worst state round-trip
  error 8.26e-11. Full verification passed: lint, typecheck, 107 tests, build,
  Prettier, task schema, asset budgets, and diff check. Requires independent
  review before DONE.
