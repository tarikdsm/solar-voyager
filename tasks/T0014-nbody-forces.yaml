spec: |
  sim/propagation/nbodyForces.ts: acceleration at point r, time t = sum over
  ALL catalog bodies of -mu_i (r-r_i)/|r-r_i|^3 (physics-spec section 3).
  Pure function usable by main sim and worker.
acceptance:
  - Analytic check vs single-body two-body acceleration
  - Lagrange L1 Earth-Sun equilibrium: net acceleration ~0 in rotating-frame test
handoff_notes: |
  Implemented the pure allocation-free Newtonian field over packed float64
  body GM/position arrays, with per-component Kahan summation, caller-owned
  output, empty-field/alias support, shape validation, and explicit NaN at the
  unsoftened point-mass singularity. The API directly accepts T0013 rails arrays
  and the first XYZ components of the seven-component relativistic ship state.
  ADR-016 defines the analytic/L1 validation profile. Single-body inverse-square
  relative error is <1e-14. The independently solved circular barycentric
  Earth-Sun L1 is 1,490,350.165 km from Earth; production gravity plus the
  test-only centrifugal term has normalized residual 1.440e-15 (<1e-10).
  Independent review found no remaining Critical/Important/Minor findings and
  confirmed zero valid-path allocations. Verified: lint, typecheck, format,
  build, 170 Vitest tests, 12 Python tests, task schema, budgets, and base-to-HEAD
  diff check all pass. Vite retains the existing 531.42 kB chunk advisory;
  critical path is 0.51 MiB / 8 MiB.
