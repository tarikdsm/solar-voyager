handoff_notes: |
  PR #31 implements the warp clamp and passed local/remote gates. Independent review
  identified that the remaining ledger-invariance acceptance cannot be validated until
  T0053 implements a nonzero ledger. Resume after T0053 is DONE, rebase PR #31, add a
  real 1x-vs-100x burn regression, obtain exact-head review, and merge normally.
  Resumed after T0053 reached DONE in merge commit 2e04d8f.
  Implemented ascending canonical warp checkpoints under one cumulative accepted-step
  budget, integration-budget rollback, and coast-only thrust lockout above 1000x.
  Added ADR-026, precise physics-spec semantics, and focused coverage for LEO clamp,
  deep-space sustain, checkpoint rollback, command invalidation, and reserved ledger
  stability. Local gates: 339 TypeScript tests + 3 skipped, 49 Python tests, build,
  lint, typecheck, formatting, task schema, budgets, six browser regressions, live
  Earth-to-Jupiter playtest with zero console warnings/errors, and simulation benchmark
  at 0.112 ms/step with two snapshots and negative retained heap growth.
  Independent review of SHA 1f8ee243 found no critical issues, one important dependency,
  and two minor documentation/whitespace issues (fixed next). The remaining acceptance
  requires a nonzero 1x-vs-100x ledger burn, whose implementation is owned by T0053.
  Resume this PR after T0053 is DONE, rebase it, and add that real ledger regression.
  Rebased onto completed T0053 and replaced the reserved zero-ledger check with a
  transactional nonzero burn regression: a rejected partial 10x candidate leaves no
  ledger residue before the accepted 5x retry, while the T0053 multi-frame 1x-vs-100x
  regression exercises the segmented warp path. Combined exact-head gates pass: 349
  TypeScript tests + 3 skipped, 49 Python tests, build, lint, typecheck, formatting,
  task schema, budgets, six browser regressions, simulation benchmark at 0.132 ms/step
  with two snapshots and negative retained heap growth, plus a live Earth-to-Jupiter
  browser playtest with zero console warnings/errors. Ready for exact-head re-review.
