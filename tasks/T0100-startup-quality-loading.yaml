  60 Python tests; two byte-identical production builds; startup, production
  smoke, visual tiers, governor, main-menu, tutorial, budgets, task schema and
  full performance gates. Bundle 125568 entry / 555034 total gzip; workload
  10 draws / 77071 triangles; 30 s heap -199866 B. Hardware flight benchmark
  on RTX 3070 Laptop: p75 6.1 ms, work p75 1.6 ms, no errors/findings.
