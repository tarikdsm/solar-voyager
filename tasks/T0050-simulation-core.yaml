spec: |
  architecture.md: SimulationCore owning clock/bodies/ship/ledger;
  step(wallDt); immutable per-frame SimSnapshot (typed arrays + derived);
  Commands interface. Snapshot includes the relativistic ship state (u,
  gamma, %c, proper time tau, power draw), the solar-system barycenter
  state and CM-relative derived vectors (v, a, p, L — physics-spec
  section 6). These two interfaces are ADR-gated from now on (ADR-007
  already covers the relativistic fields).
acceptance:
  - Snapshot consumed by a stub renderer test; no render/ui imports in sim
  - step() with zero thrust preserves two-body orbit per spec tolerances
  - Barycenter derivation matches mass-weighted sum over the catalog (test)
  - New-game LEO state carries Earth's barycentric velocity (~30 km/s rel CM)
handoff_notes: |
  SimulationCore now owns the clock, compiled rails, relativistic ship state,
  neutral ledger fields, commands, and two immutable-per-frame snapshot buffers.
  ADR-024 fixes the SimSnapshot/Commands boundary. Barycenter and CM-relative
  v/a/p/L are allocation-free; the game bootstrap creates the canonical 400 km
  LEO with Earth's 29-31 km/s barycentric velocity plus local circular speed.
  Zero-thrust ten-orbit error is < 1e-3 km. Full local CI passed: lint,
  typecheck, format, 313 TS tests (3 skipped), six browser regressions, 49 Python
  tests, build, task schema, and asset budgets. The 10,000-step full-catalog
  benchmark averaged 0.0746 ms/step, reused exactly two snapshots, and retained
  no heap growth.
  Independent review approved implementation head a6dc9bb after the mutable
  snapshot finding was fixed, then approved final documentation head 314295a
  with zero Critical, Important, or Minor findings. Exact-head CI passed.
