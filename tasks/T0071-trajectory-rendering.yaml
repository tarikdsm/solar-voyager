handoff_notes: |
  Ready for merge review on task/T0071-trajectory-rendering. The branch adds a
  float64 trajectory presentation model, one camera-relative Line2 colored by
  dominant body, one batched SOI/closest-approach/impact marker resource, the
  impact/readout signal UI, and the live module-worker lifecycle. Results are
  validated transactionally (2-2000 finite points with strictly increasing
  times) before stable buffers are changed; invalid responses surface an
  unavailable state and remain retryable. Hidden marker batches perform no
  frame update, and active packed point updates are bounded to the draw range.

  Acceptance regression: Stable Chrome loads the real Vite module worker and
  waits for data-trajectory-ready=true. The deterministic fixture reports 3
  markers, 3 segments, at most 2 prediction draw calls, and 0 px maximum
  marker/polyline projection error at both 45-degree and 20-degree FOV. A real
  playtest changed the target to Moon, completed in 14.744 s with a 353,539 km
  closest approach, and remained responsive under zoom and 5x warp with zero
  console errors or warnings.

  Performance evidence is in docs/bench/T0071-summary.md. The before/after
  hardware benchmark held frame median/p75 at 6.100/6.100 ms; p99 changed by
  +0.001 ms, frame-work p99 by +0.200 ms, and steady heap improved by 9,896 B.
  The CI workload golden intentionally advances from 9 calls / 65,077
  triangles to 10 / 77,071 for one 1,999-segment Line2, retaining +/-10%
  tolerance and remaining below the 150 / 500k budgets. The final performance
  gate passed at 10 / 77,071 with -200,723 B retained heap; its allocation and
  draw-call fixtures failed as required. Final entry/total gzip are 267,497 /
  538,749 B against 285,000 / 570,000 B limits.

  Fresh final gates: lint, strict typecheck, Prettier, build, git diff check,
  task schema (53 files), asset budgets, application smoke, trajectory browser
  regression, performance gates, full Vitest (99 passed files, 1 skipped; 609
  passed tests, 3 skipped), and Python tools (50 tests) all pass. CI now runs
  test:trajectory-overlay permanently and a workflow regression enforces that
  step. Build retains only the existing Vite >500 kB chunk advisory.

  The first PR CI run passed lint through the two-minute performance gate, then
  exposed CPU starvation in application smoke: unrelated SwiftShader pages
  competed with the new 90-day worker job. The run was cancelled rather than
  left hanging. A narrowly named test-only runtime sentinel now prevents the
  worker from starting in smoke, camera-control, and renderer-policy contracts;
  smoke asserts that no predictor worker request escaped isolation. The real
  worker remains mandatory in the trajectory regression, performance gate,
  benchmark, and normal application. Focused isolation tests plus all three
  affected browser contracts pass locally; a fresh PR CI run is required.
  A second run again passed the performance gate but confirmed the block inside
  Playwright's Chromium Headless Shell smoke process itself, with no leaked
  performance-gate process. It was cancelled after log
  capture. Application smoke now uses the GitHub-hosted runner's preinstalled
  Stable Chrome (the same channel as the successful trajectory E2E) and has a
  structurally tested five-minute CI timeout. The full Stable-Chrome smoke
  contract passes locally in about 10 s; a third PR CI run is required.
  The third run confirmed that fix: smoke and all following regressions through
  state-vector passed. Trajectory prediction also reached ready=true, then the
  test failed only because a brittle nth-child locator could not find the
  already-rendered Next approach row on Linux. The regression now finds the
  semantic dt label and reads its adjacent dd, and passes locally with the real
  worker and 0 px alignment. A fourth PR CI run is required.
  The fourth run again reached the trajectory step after all prior gates, and
  the semantic read no longer failed; the successful page instead remained
  alive with its worker after assertions. The harness now navigates the
  production page to about:blank to trigger pagehide/client disposal, closes it
  explicitly, and has a structurally tested four-minute CI timeout. The full
  regression passes locally in about 28 s; a fifth PR CI run is required.
  The fifth run again passed every earlier gate, then showed that the complete
  90-day prediction itself can exceed four minutes on a shared runner. The
  dedicated regression now injects a validated test-only six-hour horizon
  before application startup while retaining the real Vite worker, production
  predictor protocol, and integrator. Normal gameplay, the hardware benchmark,
  and the performance gate omit the override and retain the canonical
  90-day-or-longer horizon. Locally, the regression now finishes in 14.5 s with
  ready=true, the expected HUD state, two prediction calls, and 0 px alignment;
  the separate production performance gate still passes at 10 calls / 77,071
  triangles. Sixth CI run 29642564311 validated the exact head cf3f1a6 through
  Vitest, build, performance, smoke, and every browser regression preceding
  trajectory. The trajectory step then remained pending for 83.7 s on
  SwiftShader (7.7 FPS) and failed its 90 s readiness assertion with no console
  or page errors. Therefore the six-hour override is locally proven but not yet
  proven effective on the shared runner. No further fix was attempted after
  this evidence; resume with instrumentation across the init-property -> main
  bootstrap -> request protocol -> worker executor boundary before changing
  behavior or timeouts.

  Final pause point: the test-only horizon delta passed 27 focused Vitest
  tests, strict typecheck, ESLint, Prettier, build, task schema, asset budgets,
  the Stable-Chrome trajectory regression, and the production performance
  gate. The three expensive contracts that timed out under full-suite local
  CPU contention all passed unchanged when rerun individually; no timeout or
  assertion was weakened. Python tools passed 50/50. An independent reviewer
  found no Critical, Important, or Minor findings and approved the delta for
  commit and a fresh CI run. PR #47 at cf3f1a6 remains the continuation point;
  CI run 29642564311 is the latest authoritative failure evidence. Task status
  intentionally stays REVIEW until a later exact-head CI is green and the
  normal merge can mark it DONE.

  Continuation diagnosis found the six-hour override was propagated correctly,
  but the worker still generated the fixed production maximum of 2,000 output
  points. Because the predictor performs at least one DP54 propagation per
  output point, shortening only the horizon did not reduce the sampling floor
  that competed with SwiftShader. The dedicated browser regression now also
  injects a validated test-only 128-point limit across init property, main,
  client, protocol, and worker executor. Production requests still omit both
  test overrides and retain the canonical horizon plus 2,000 points.

  RED failed at all four intended boundaries; GREEN passes 28/28 focused tests.
  The real Vite worker regression completes locally in 5.9 s with ready=true,
  two draw calls, three markers/segments, and 0 px alignment at both FOVs.
  Lint, strict typecheck, Prettier, build, task schema, asset budgets, smoke,
  611 Vitest tests (3 skipped), and 50 Python tests pass. The production
  performance gate remains 10 calls / 77,071 triangles, +69,540 B retained
  heap, and 267,797 / 539,129 B entry/total gzip. A fresh exact-head CI run is
  the only remaining delivery gate.

  Independent review found no remaining Critical, Important, or Minor code
  findings after RED/GREEN corrections. The final delivery-only findings were
  to add the browser regression to CI and move this task to REVIEW; both are
  included in the branch. Normal PR/CI flow is still required before DONE.
