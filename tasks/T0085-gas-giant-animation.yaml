handoff_notes: |
  Implementation complete through 18d2ede. Jupiter, Saturn, Uranus, and Neptune
  use deterministic simulation-time band shear, bounded spherical domain warp,
  storm shimmer, and Jupiter's counterclockwise Great Red Spot rotation while
  sampling their existing albedo/detail textures. The governor selects 4/2/1
  octaves through stable uniforms and one stable shader program; disabled mode
  preserves the original map path. Material hooks, cache keys, controllers, and
  scene binding are transactional, including validation and compile failures.

  Actual-WebGL acceptance passed with four programs stable after warm-up, one
  unchanged surface draw and 16,128 triangles per body, zero GL/page/console
  errors, and only the 16 existing catalog texture requests. Static identity
  correlation was 0.993752/0.999624/0.999751/0.999619 for Jupiter/Saturn/Uranus/
  Neptune. One-hour motion MAD was 9.3286/2.0103/0.7288/1.3308 RGB units with
  luminance drift below 2%. Jupiter's localized spot signal was 2.37x its
  control, and the animated crop matched the counterclockwise reference better
  than the clockwise control. Close detail blend was 0.692812 for every body.

  Paired benchmark evidence is in docs/bench/T0085-*.json/.md. Normal-flight
  median/p75 stayed 6.1/6.1 ms, draw/triangle maxima stayed 26/66,246, steady
  heap growth changed by 300 B, and entry/total gzip changed by 2,970/2,969 B.
  The isolated RTX 3070 GPU timer benchmark measured full/minimum p50 at
  1.874944/1.368064 ms; p75 was 3.052032/3.045376 ms under concurrent GPU load.
  The final formal production gate passed with -137,288 B retained, exactly 10
  draws and 77,071 triangles, entry/total gzip 279,959/551,332 B, while both
  injected allocation and draw-call negative controls were rejected.

  Final verification: Vitest 115 files passed plus one skipped (684 tests passed,
  3 skipped); lint, typecheck, formatting, build, Python tools, task/schema and
  asset budgets, gas-giant, surface-detail, ring-system/flythrough, visual-tier,
  lighting/post, procedural-Sun, renderer-policy, performance-governor, smoke,
  and production performance gates passed. Independent review of exact SHA
  f78f719 returned READY with no Critical, Important, or Minor findings after
  checking precompile-in-scene and full rollback. The first PR CI reached the
  five-minute application-smoke timeout because the lazy callback redundantly
  compiled the whole scene. Commit 18d2ede now calls the Three.js targeted API
  compileAsync(root, camera, targetScene); unit coverage locks all three
  arguments and smoke, visual-tier, and gas-giant browsers pass. Independent
  incremental review of 18d2ede also returned READY with no findings. The
  available hardware is an RTX 3070 Laptop GPU rather than the specified
  integrated reference GPU.

  After T0095 merged, commit cc9c268 integrated origin/main without rewriting
  branch history. Fresh verification on that merge passed 115 Vitest files plus
  one skipped (689 tests passed, 3 skipped), lint, typecheck, formatting, build,
  task schema, application smoke, visual-tier fly-in, gas-giant regression, and
  the complete performance gate. Production measured -200,947 B retained with
  exactly 10 draw calls / 77,071 triangles; the allocation fixture retained
  +2,938,036 B and the draw fixture injected 29 calls / 65,077 triangles, so
  both negative controls were rejected. PR #51 CI run 29673611149, job
  88156853813, passed in 8m29s on exact SHA cc9c268. This DONE transition rides
