handoff_notes: |
  Ready for independent review on task/T0055-navball. The bottom-center navball
  derives its dominant-body orbital frame directly from the existing float64
  SimSnapshot: radial-out/in, prograde/retrograde, and normal/antinormal markers
  are projected through the inverse ship quaternion into a static SVG. The thrust
  reticle uses proper acceleration, the horizon is body-relative, and invalid or
  degenerate inputs hide affected geometry with finite transforms. No snapshot,
  command, schema, or physics-formula interface changed, so no ADR was required.

  The allocation-free projection writer owns a setup-time Float64Array and the
  existing sampled HUD graph copies only scalar slots into leaf signals at 10 Hz.
  Component functions remain at one render while transforms and opacity update.
  The SVG adds no WebGL draw calls, geometry, materials, or runtime shaders.

  Acceptance evidence: the exact circular-equatorial LEO fixture places radial
  out at the ship nose, prograde to screen right, normal upward, and verifies all
  six antipodal markers. Focused tests also cover inverse-quaternion attitude,
  thrust direction, and invalid/degenerate finite hiding. Chromium verifies the
  same marker geometry, a prograde attitude rotation, active thrust visibility,
  all six leaf-only updates without component rerenders, responsive containment,
  scroll, and canvas pointer/wheel delivery.

  Production playtest inspected 1280x720 and 390x844 layouts, confirmed Earth and
  Manual labels plus finite live marker transforms, found no panel intersections
  or clipping, and recorded zero console errors or warnings. The initial legend
  clipping found during playtest was corrected before the final pass.

  Full gates at implementation SHA 13d521954c23dc2b827be75eff6836d2c94f425c:
  lint PASS; strict typecheck PASS; Prettier PASS; Vitest 369 passed / 3 skipped;
  Python 49/49; production build PASS; repo/public/critical asset budgets PASS;
  53 task files PASS; all seven Chromium regressions PASS; diff check PASS.
  The simulation benchmark averaged 0.080042 ms per step, retained fewer bytes,
  and preserved two snapshot buffers.

  Scaffold baseline 2cfd14c measured 149.9/150.0/166.7 ms at median/p75/p99.
  Three exact-code captures measured 150.0/~150.0/~183.3 ms externally but all
  retained an internal p99 of 166.7 ms, 6 draws, 48,564 triangles, no errors, and
  sampled UI time no greater than 0.10 ms. A same-build Intel UHD D3D11 A/B
  diagnostic measured p99 6.20 ms both with the navball visible and after removing
  it (max 6.40 vs 6.50 ms), isolating the external tail to Chromium/SwiftShader
  scheduling rather than SVG composition. Raw results and interpretation are in
  docs/bench/T0055-summary.md.

  Independent review of SHA 3332e0f found one Important and two Minor issues:
  the ground fill used a straight translated rectangle and drew the hidden horizon
  arc; finite subnormal normalization could publish NaN/Infinity; and the accessible
  region was named only "Earth" while opacity-hidden SVG text remained exposed.
  All three are resolved at 430327d. Static upper/lower half-ellipse caps now render
  the exact visible ground/sky boundary for radial-out, intermediate, and radial-in
  attitudes; direct magnitude division keeps subnormal inputs finite; and the
  region is named Navball with a live available/unavailable text status while the
  decorative SVG is hidden from assistive technology.

  The fixes were reproduced RED before implementation. Focused GREEN coverage is
  9 projection tests plus the real-DOM regression, including a 0.5-scale intermediate
  horizon, full radial-in ground, four subnormal input classes, ARIA roles/status,
  and unchanged one-render component counts. Visual playtest inspected the corrected
  curved crescent and full radial-in disc; an initially inverted SVG sweep found by
  that playtest was corrected before the final gates.

  Fresh post-review gates: lint, strict typecheck, Prettier, production build,
  budgets, task schema, and diff check PASS; Vitest 374 passed / 3 skipped; Python
  49/49; all seven Chromium regressions PASS. Simulation benchmark averaged
  0.087886 ms, retained -175,488 bytes, and preserved two snapshot buffers.

  Exact-code SwiftShader captures retained 150.0/150.0/183.3 ms externally with
  6 draws, 48,564 triangles, 0.00 ms sampled UI time, and zero errors; the rolling
  internal windows captured 180.23 and 183.40 ms p99. A versioned 600+600 frame
  Intel UHD D3D11 A/B measured identical 6.10/6.10/6.20 ms median/p75/p99 with
  navball visible and removed, max 6.30 versus 6.50 ms. Exact artifacts are under
  docs/bench/.
